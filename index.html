<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080d16"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="R3SET"/>
<title>R3SET</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080d16;color:#dde8f8;font-family:'Outfit',system-ui,-apple-system,sans-serif;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
:root{--bg:#080d16;--surface:#0f1624;--card:#131d2e;--border:#1a2840;--accent:#00e5b0;--danger:#ff4d6a;--warn:#ffb830;--purple:#a78bfa;--blue:#38bdf8;--text:#dde8f8;--muted:#4e6280}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px #00e5b055}
input[type=number],input[type=text]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;width:100%;outline:none}
input[type=number]:focus,input[type=text]:focus{border-color:var(--accent)}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;width:100%;outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 18px}
.mono{font-family:'JetBrains Mono',monospace}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.5px;text-transform:uppercase;display:inline-block}
.btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center}
.row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;border-bottom:1px solid var(--border)}
.row:active{background:var(--surface)}
.tab-content{padding:14px 14px 0;display:none}
.tab-content.active{display:flex;flex-direction:column;gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.modal-overlay{position:fixed;inset:0;background:#000c;z-index:1000;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--border);padding:24px 20px 48px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;z-index:2000;white-space:nowrap;box-shadow:0 4px 20px #0008;display:none;color:#000}
.bar-track{background:var(--border);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.toggle{width:36px;height:20px;border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s}
/* Slider+input combo */
.sl-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.sl-row input[type=number]{width:80px;flex-shrink:0;text-align:center;padding:7px 8px}
.sl-row input[type=range]{flex:1}
#app{max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:80px}
/* Win log */
.win-item{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid var(--border)}
.win-badge{font-size:20px;flex-shrink:0;line-height:1.2}
</style>
</head>
<body>
<div id="app">
  <div id="header" style="background:linear-gradient(180deg,#0c1828 0%,#080d16 100%);padding:20px 20px 0;border-bottom:1px solid var(--border)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="width:38px;height:38px;background:linear-gradient(135deg,#00e5b0,#009e7a);border-radius:11px;display:grid;place-items:center;font-size:20px;flex-shrink:0">🏦</div>
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-1px">R3SET</div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1.5px">DEBT FREEDOM TRACKER</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="font-size:9px;color:var(--muted);letter-spacing:.5px">NET WORTH</div>
        <div id="hdr-networth" class="mono" style="font-size:18px;font-weight:800;color:var(--accent)">$0</div>
      </div>
    </div>
    <div style="display:flex" id="tab-bar"></div>
  </div>
  <div id="install-banner" style="display:none;background:#00e5b015;border-bottom:1px solid #00e5b044;padding:10px 16px;align-items:center;justify-content:space-between">
    <span style="font-size:12px;color:var(--accent)">📲 Add R3SET to home screen</span>
    <div style="display:flex;gap:8px">
      <button onclick="installApp()" class="btn btn-sm" style="background:#00e5b022;color:var(--accent);border:1px solid #00e5b044">Install</button>
      <button onclick="document.getElementById('install-banner').style.display='none'" class="btn btn-sm" style="background:transparent;color:var(--muted);border:1px solid #1a284055">✕</button>
    </div>
  </div>
  <div id="tab-dashboard" class="tab-content active"></div>
  <div id="tab-debts" class="tab-content"></div>
  <div id="tab-accounts" class="tab-content"></div>
  <div id="tab-income" class="tab-content"></div>
  <div id="tab-plan" class="tab-content"></div>
  <div id="tab-wins" class="tab-content"></div>
</div>
<div id="toast"></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div id="modal-title" style="font-size:15px;font-weight:700"></div>
      <button onclick="closeModal()" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 10px;font-size:16px">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
'use strict';
const KEY='r3set_v3';
function load(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):null}catch{return null}}
function persist(s){try{localStorage.setItem(KEY,JSON.stringify(s))}catch{}}

const COLORS=['#ff4d6a','#ffb830','#a78bfa','#38bdf8','#00e5b0','#f97316'];

const DEFAULTS={
  savedAmount:900,
  extraPayment:200,strategy:'avalanche',businessExpenses:150,
  // Income streams — fully editable array
  incomeStreams:[
    {id:1,name:'9-5 Job',icon:'⏱',rate:15,hours:40,color:'#38bdf8'},
    {id:2,name:'Freelance',icon:'🚀',rate:40,hours:10,color:'#00e5b0'},
  ],
  debts:[
    {id:1,name:'Closed CC',balance:5000,originalBalance:5000,minPayment:100,apr:24.99,color:'#ff4d6a'},
    {id:2,name:'Open CC',balance:980,originalBalance:1000,minPayment:25,apr:22.99,color:'#ffb830'},
  ],
  accounts:[
    {id:1,name:'Checking',type:'checking',balance:0,color:'#38bdf8'},
    {id:2,name:'Savings',type:'savings',balance:900,color:'#00e5b0'},
  ],
  expenses:[
    {id:1,name:'Rent',amount:1000,category:'housing',recurring:true,completed:false},
    {id:2,name:'Wisdom Teeth',amount:718,category:'medical',recurring:false,completed:false},
    {id:3,name:'Tires',amount:400,category:'auto',recurring:false,completed:false},
  ],
  incomeLog:[],
  wins:[],  // {id, text, date, type: 'payment'|'expense'|'manual', amount?}
};

let ST=load()||JSON.parse(JSON.stringify(DEFAULTS));
// Migrate old data that had w2Hours etc
if(ST.w2Hours!==undefined&&!ST.incomeStreams){
  ST.incomeStreams=[
    {id:1,name:'9-5 Job',icon:'⏱',rate:ST.w2Rate||15,hours:ST.w2Hours||40,color:'#38bdf8'},
    {id:2,name:'Freelance',icon:'🚀',rate:ST.freelanceRate||40,hours:ST.freelanceHours||10,color:'#00e5b0'},
  ];
  delete ST.w2Hours;delete ST.w2Rate;delete ST.freelanceHours;delete ST.freelanceRate;
}
if(!ST.wins) ST.wins=[];
function save(){persist(ST)}
function uid(){return Date.now()+''+Math.random().toString(36).slice(2,6)}

// ── HELPERS ──────────────────────────────────────────────────────────────
const fmt=(n)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0);
function calcMonths(bal,apr,pay){
  if(!bal||bal<=0)return 0;
  if(!pay||pay<=0)return 9999;
  const r=apr/100/12;
  if(r===0)return Math.ceil(bal/pay);
  if(pay<=bal*r)return 9999;
  const m=-Math.log(1-(r*bal)/pay)/Math.log(1+r);
  return(!isFinite(m)||isNaN(m)||m<0)?9999:Math.ceil(m);
}
function moLabel(m){
  if(m>=9999)return '∞';if(m===0)return 'Paid!';
  if(m<12)return m+'mo';
  const y=Math.floor(m/12),mo=m%12;
  return mo>0?y+'y '+mo+'mo':y+'yr';
}
function barHtml(val,max,color,h=8){
  const pct=Math.min((val/Math.max(max,1))*100,100);
  return`<div class="bar-track" style="height:${h}px"><div class="bar-fill" style="width:${pct}%;height:100%;background:${color}"></div></div>`;
}
function pill(label,color){return`<span class="pill" style="background:${color}25;color:${color}">${label}</span>`}
function btn(label,color,onclick,extra=''){return`<button class="btn ${extra}" style="background:${color}22;color:${color};border:1px solid ${color}44" onclick="${onclick}">${label}</button>`}
function btnGhost(label,color,onclick,extra=''){return`<button class="btn ${extra}" style="background:transparent;color:${color};border:1px solid ${color}33" onclick="${onclick}">${label}</button>`}
function sep(){return`<div style="border-top:1px solid var(--border);margin:8px 0"></div>`}
function sh(title,btnHtml=''){return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;font-weight:600">${title}</div>${btnHtml}</div>`}
function card(inner,style=''){return`<div class="card" style="${style}">${inner}</div>`}
function statBox(label,val,color){return`<div style="background:#ffffff08;border-radius:10px;padding:10px 8px;text-align:center"><div class="mono" style="font-size:13px;font-weight:800;color:${color}">${val}</div><div style="font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px">${label}</div></div>`}
function kpiCard(label,val,color){return`<div class="card" style="padding:11px 8px;text-align:center"><div class="mono" style="font-size:13px;font-weight:700;color:${color}">${val}</div><div style="font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px">${label}</div></div>`}
function actionStep(text,color){return`<div style="display:flex;gap:8px;margin-bottom:8px"><span style="color:${color};flex-shrink:0">→</span><span style="font-size:12px;color:var(--muted);line-height:1.6">${text}</span></div>`}

// Slider + number input combo — synced
function sliderRow(id,min,max,step,val,onchange){
  return`<div class="sl-row">
    <input type="range" min="${min}" max="${max}" step="${step}" value="${val}" id="sl-${id}" oninput="syncSlider('${id}',+this.value,${JSON.stringify(onchange).replace(/"/g,"'")})">
    <input type="number" min="${min}" max="${max}" step="${step}" value="${val}" id="ni-${id}" oninput="syncNum('${id}',+this.value,${JSON.stringify(onchange).replace(/"/g,"'")})">
  </div>`;
}
function syncSlider(id,val,cb){
  const ni=document.getElementById('ni-'+id);if(ni)ni.value=val;
  try{eval(cb.replace('__V__',val))}catch(e){}
}
function syncNum(id,val,cb){
  const sl=document.getElementById('sl-'+id);if(sl)sl.value=val;
  try{eval(cb.replace('__V__',val))}catch(e){}
}

let _currentTab='dashboard';
function showToast(msg,color='#00e5b0'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2800);
}

// ── COMPUTED ─────────────────────────────────────────────────────────────
function computed(){
  const s=ST,tax=0.22;
  const totalStreamGross=s.incomeStreams.reduce((a,is)=>a+is.rate*is.hours*4.33,0);
  const monthlyGross=totalStreamGross;
  const monthlyNet=monthlyGross*(1-tax);
  const totalDebt=s.debts.reduce((a,d)=>a+d.balance,0);
  const totalMinPay=s.debts.reduce((a,d)=>a+d.minPayment,0);
  const recurringExp=s.expenses.filter(e=>e.recurring&&!e.completed).reduce((a,e)=>a+e.amount,0);
  const monthlyFixed=recurringExp+s.businessExpenses+totalMinPay;
  const discretionary=monthlyNet-monthlyFixed;
  const totalAssets=s.accounts.reduce((a,ac)=>a+ac.balance,0);
  const netWorth=totalAssets-totalDebt;
  const sorted=[...s.debts].sort((a,b)=>s.strategy==='avalanche'?b.apr-a.apr:a.balance-b.balance);
  const debtPayoff=sorted.map((d,i)=>{
    const pay=d.minPayment+(i===0?s.extraPayment:0);
    return{...d,pay,months:calcMonths(d.balance,d.apr,pay)};
  });
  let freed=0,cum=0;
  const sequence=sorted.map((d,i)=>{
    const pay=d.minPayment+s.extraPayment+freed;
    const months=calcMonths(d.balance,d.apr,pay);
    const interest=Math.max(0,(pay*months)-d.balance);
    const start=cum;cum+=months;
    const rollover=i>0?sorted[i-1].name:null;
    freed+=d.minPayment;
    return{...d,pay,months,interest,startMonth:start,endMonth:cum,rollover};
  });
  const totalMonths=sequence.length?sequence[sequence.length-1].endMonth:0;
  const totalInterest=sequence.reduce((a,d)=>a+d.interest,0);
  return{monthlyGross,monthlyNet,totalDebt,totalMinPay,recurringExp,monthlyFixed,
    discretionary,totalAssets,netWorth,debtPayoff,sequence,totalMonths,totalInterest,tax};
}

// ── TABS ─────────────────────────────────────────────────────────────────
const TABS=[
  {id:'dashboard',icon:'⌂',label:'Home'},
  {id:'debts',icon:'◎',label:'Debts'},
  {id:'accounts',icon:'◈',label:'Accounts'},
  {id:'income',icon:'◉',label:'Income'},
  {id:'plan',icon:'◆',label:'Plan'},
  {id:'wins',icon:'👍',label:'Wins'},
];
function switchTab(id){
  _currentTab=id;
  TABS.forEach(t=>{
    const el=document.getElementById('tab-'+t.id);
    if(el)el.classList.toggle('active',t.id===id);
  });
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const active=b.dataset.tab===id;
    b.style.borderBottom=active?'2px solid var(--accent)':'2px solid transparent';
    b.style.color=active?'var(--accent)':'var(--muted)';
  });
  renderTab(id);
}
function initTabBar(){
  const bar=document.getElementById('tab-bar');
  bar.innerHTML=TABS.map(t=>`<button class="tab-btn" data-tab="${t.id}" onclick="switchTab('${t.id}')"
    style="flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);
    padding:6px 2px 10px;font-size:10px;font-weight:700;letter-spacing:.2px;display:flex;flex-direction:column;align-items:center;gap:2px">
    <span style="font-size:13px">${t.icon}</span>${t.label}</button>`).join('');
}

// ── ADD WIN ───────────────────────────────────────────────────────────────
function addWin(text,type,amount){
  const win={id:uid(),text,type,date:new Date().toLocaleDateString(),amount:amount||0};
  ST.wins.unshift(win);save();
  if(_currentTab==='wins')renderWins();
  // update badge
  updateWinBadge();
}
function updateWinBadge(){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    if(b.dataset.tab==='wins'){
      const count=ST.wins.length;
      b.querySelector('span').textContent=count>0?'👍':'👍';
    }
  });
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function renderDashboard(){
  const c=computed(),s=ST;
  const oneTime=s.expenses.filter(e=>!e.recurring);
  const recurring=s.expenses.filter(e=>e.recurring);
  const pendingTotal=oneTime.filter(e=>!e.completed).reduce((a,e)=>a+e.amount,0);

  let html=`<div class="grid3">
    ${kpiCard('Monthly Net',fmt(c.monthlyNet),'var(--accent)')}
    ${kpiCard('Total Debt',fmt(c.totalDebt),'var(--danger)')}
    ${kpiCard('Discretionary',fmt(c.discretionary),c.discretionary>0?'var(--accent)':'var(--danger)')}
  </div>`;

  html+=card(`
    ${sh('💵 Savings on Hand')}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;color:var(--muted)">Current</span>
      <div class="mono" style="font-size:22px;font-weight:800;color:var(--accent)">${fmt(s.savedAmount)}</div>
    </div>
    ${sliderRow('savings',0,10000,50,s.savedAmount,"ST.savedAmount=__V__;save();renderDashboard();updateHeader()")}
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px"><span>$0</span><span>Type or slide to update</span><span>$10k</span></div>
    ${s.savedAmount>0?`<div style="margin-top:10px;background:var(--accent)15;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--accent)">💡 Apply ${fmt(s.savedAmount)} to priority debt → reduces balance & interest immediately</div>`:''}
  `);

  html+=card(`
    ${sh('⚡ One-Time Payments',btn('+ Add','var(--accent)',"openModal('expense',{recurring:false})"))}
    ${oneTime.length===0?'<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px 0">No one-time expenses</div>':''}
    ${oneTime.map(e=>`
      <div class="row" style="cursor:pointer">
        <div onclick="toggleExpense(${e.id})" style="width:22px;height:22px;border-radius:6px;border:2px solid ${e.completed?'var(--accent)':'var(--border)'};
          background:${e.completed?'var(--accent)':'transparent'};display:grid;place-items:center;flex-shrink:0;transition:all .2s;cursor:pointer">
          ${e.completed?'<span style="font-size:12px;color:#000">✓</span>':''}
        </div>
        <div style="flex:1;cursor:pointer" onclick="openModal('expense',${JSON.stringify(e).replace(/"/g,'&quot;')})">
          <div style="font-size:13px;text-decoration:${e.completed?'line-through':'none'};color:${e.completed?'var(--muted)':'var(--text)'}">${e.name}</div>
          ${pill(e.category,'var(--warn)')}
        </div>
        <div class="mono" style="font-size:14px;font-weight:700;color:${e.completed?'var(--muted)':'var(--warn)'};text-decoration:${e.completed?'line-through':'none'}">${fmt(e.amount)}</div>
      </div>`).join('')}
    ${sep()}
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--muted)">Remaining</span>
      <span class="mono" style="font-weight:700;color:var(--warn)">${fmt(pendingTotal)}</span>
    </div>
  `);

  html+=card(`
    ${sh('🔁 Monthly Bills',btn('+ Add','var(--blue)',"openModal('expense',{recurring:true})"))}
    ${recurring.length===0?'<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">No recurring bills</div>':''}
    ${recurring.map(e=>`
      <div class="row" style="cursor:pointer" onclick="openModal('expense',${JSON.stringify(e).replace(/"/g,'&quot;')})">
        <div style="width:7px;height:7px;border-radius:99px;background:var(--blue);flex-shrink:0"></div>
        <span style="flex:1;font-size:13px">${e.name}</span>
        ${pill(e.category,'var(--blue)')}
        <span class="mono" style="font-size:13px;font-weight:700;color:var(--blue)">${fmt(e.amount)}</span>
      </div>`).join('')}
    ${sep()}
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--muted)">Total/month</span>
      <span class="mono" style="font-weight:700;color:var(--blue)">${fmt(c.recurringExp)}</span>
    </div>
  `);

  html+=`<div style="text-align:center;padding-bottom:8px">${btnGhost('⚙ Reset All Data','var(--muted)',"openModal('confirm_reset',{})")}</div>`;
  document.getElementById('tab-dashboard').innerHTML=html;
}

function toggleExpense(id){
  const e=ST.expenses.find(x=>x.id===id);
  if(!e)return;
  e.completed=!e.completed;save();
  if(e.completed){
    showToast('✅ "'+e.name+'" done!');
    addWin(`Paid ${e.name} (${fmt(e.amount)})`,'expense',e.amount);
  }
  renderDashboard();
}

// ── DEBTS ─────────────────────────────────────────────────────────────────
function renderDebts(){
  const c=computed(),s=ST;
  let html=card(`
    <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.8px;text-transform:uppercase">Payoff Strategy</div>
    <div class="grid2">

function updateStream(id,field,val){
  const is=ST.incomeStreams.find(x=>x.id===id);
  if(!is)return;
  is[field]=val;
  // sync slider if hours changed
  if(field==='hours'){
    const sl=document.getElementById('sl-hrs-'+id);
    const ni=document.getElementById('ni-hrs-'+id);
    if(sl)sl.value=val;if(ni)ni.value=val;
  }
  save();
  // re-render just the stats without full re-render to avoid losing focus
  renderIncome();updateHeader();
}

        ${d.rollover?actionStep(`🔄 Roll ${fmt(prevPay)} freed from ${d.rollover} → now paying ${fmt(d.pay)}/mo total`,d.color):actionStep(`💸 Pay ${fmt(d.pay)}/mo (${fmt(d.minPayment)} min + ${fmt(s.extraPayment)} extra)`,d.color)}
        ${actionStep(`📅 Payoff in ~${moLabel(d.months)} — month ${d.startMonth}–${d.endMonth} of your plan`,d.color)}
        ${actionStep(`💰 Estimated interest at this pace: ${fmt(d.interest)}`,d.color)}
        ${isFirst&&isAva&&d.apr>20?actionStep(`🚨 ${d.apr}% APR = ${fmt(d.balance*d.apr/100/12)}/mo in interest — attack this hard`,d.color):''}
        ${isFirst&&!isAva?actionStep(`🏆 Fastest win — clearing this frees ${fmt(d.pay)}/mo to snowball into next debt`,d.color):''}
      </div>
      <div class="grid3">
        ${[['Pay/mo',fmt(d.pay)],['Payoff',moLabel(d.months)],['Interest',fmt(d.interest)]].map(([l,v])=>`
          <div style="background:#ffffff06;border-radius:8px;padding:7px;text-align:center">
            <div style="font-size:10px;color:var(--muted)">${l}</div>
            <div class="mono" style="font-weight:700;font-size:12px;color:${d.color};margin-top:2px">${v}</div>
          </div>`).join('')}
      </div>
    </div>`;
  });

  if(c.totalMonths<9999){
    const fd=new Date(Date.now()+c.totalMonths*30.5*24*60*60*1000).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    html+=card(`
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:28px;margin-bottom:8px">🏁</div>
        <div style="font-size:15px;font-weight:800;color:var(--accent)">Debt-Free in ~${moLabel(c.totalMonths)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">Around <strong style="color:var(--text)">${fd}</strong></div>
        <div style="margin-top:14px;background:var(--accent)15;border-radius:8px;padding:10px;font-size:12px;color:var(--accent)">
          💡 Switch strategy in Debts tab to compare Avalanche vs Snowball timelines
        </div>
      </div>
    `,'background:linear-gradient(135deg,#0d2e1a,#0a1628);border-color:var(--accent)55');
  }

  html+=card(`
    <div style="display:flex;gap:12px">
      <div class="mono" style="background:var(--purple)20;color:var(--purple);font-weight:800;font-size:13px;padding:5px 9px;border-radius:8px;flex-shrink:0;align-self:flex-start">AFTER</div>
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--purple);margin-bottom:10px">Month ${c.totalMonths<9999?c.totalMonths+1:'?'}+ — Build Wealth</div>
        ${actionStep(`Redirect ${fmt(c.totalMinPay+s.extraPayment)}/mo (old debt payments) into a HYSA`,'var(--purple)')}
        ${actionStep('3-month emergency fund target: '+fmt((c.recurringExp+s.businessExpenses)*3),'var(--purple)')}
        ${actionStep('Set aside 25–30% of every freelance check for self-employment taxes','var(--purple)')}
        ${actionStep('Emergency fund complete → open a Roth IRA, invest in index funds','var(--purple)')}
        ${actionStep('Keep freelance as a separate business — track income & expenses for taxes','var(--purple)')}
      </div>
    </div>
  `);

  html+=card(`
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">📐 Your Budget Targets</div>
    ${[['50%',fmt(c.monthlyNet*.5),'Needs — rent, bills, food, minimums'],
       ['30%',fmt(c.monthlyNet*.3),'Debt attack — above minimums'],
       ['10%',fmt(c.monthlyNet*.1),'Emergency buffer'],
       ['10%',fmt(c.monthlyNet*.1),'Living — burnout is real']].map(([p,amt,l])=>`
      <div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:center">
        <span class="mono" style="font-weight:700;color:var(--accent);width:38px;flex-shrink:0;font-size:12px">${p}</span>
        <span class="mono" style="color:var(--text);font-weight:600;font-size:12px;width:60px;flex-shrink:0">${amt}</span>
        <span style="font-size:11px;color:var(--muted);line-height:1.4">${l}</span>
      </div>`).join('')}
  `);

  document.getElementById('tab-plan').innerHTML=html;
}

// ── MODALS ────────────────────────────────────────────────────────────────
function openModal(type,data){
  const overlay=document.getElementById('modal-overlay');
  const title=document.getElementById('modal-title');
  const body=document.getElementById('modal-body');
  overlay.classList.add('open');
  const fld=(id,lbl,type2,val,ph='')=>`<div><div style="font-size:11px;color:var(--muted);margin-bottom:5px">${lbl}</div><input type="${type2}" id="${id}" value="${val}" placeholder="${ph}"></div>`;
  const sel=(id,lbl,opts,cur)=>`<div><div style="font-size:11px;color:var(--muted);margin-bottom:5px">${lbl}</div><select id="${id}">${opts.map(o=>`<option value="${o}" ${cur===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  const saveBtns=(id,delFn)=>`<div style="display:flex;gap:8px;padding-top:4px">
    ${id?`<button class="btn" style="background:transparent;color:var(--danger);border:1px solid var(--danger)33" onclick="${delFn}(${id})">🗑 Delete</button>`:''}
    <button class="btn btn-full" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44" onclick="_modalSave()">Save</button>
  </div>`;

  if(type==='debt'){
    title.textContent=data.id?'Edit Debt':'Add Debt';
    window._modalSave=()=>saveDebt(data.id||0);
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
      ${fld('m-name','Debt Name','text',data.name||'','e.g. Chase Visa')}
      <div class="grid2">
        ${fld('m-balance','Current Balance','number',data.balance||'')}
        ${fld('m-orig','Original Balance','number',data.originalBalance||'')}
        ${fld('m-min','Min Payment','number',data.minPayment||'')}
        ${fld('m-apr','APR %','number',data.apr||'')}
      </div>
      ${saveBtns(data.id,'delDebt')}
    </div>`;
  } else if(type==='payment'){
    title.textContent='Pay: '+data.name;
    window._modalSave=()=>applyPayment(data.id);
    body.innerHTML=`
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px">Balance: <strong style="color:var(--text)">${fmt(data.balance)}</strong></div>
      <div style="margin-bottom:12px">${fld('m-payamt','Amount','number',data.minPayment||'',String(data.minPayment||''))}</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        ${[data.minPayment,data.minPayment*2,data.balance].filter(v=>v&&v>0).map(v=>`
          <button class="btn btn-sm" style="background:transparent;color:var(--accent);border:1px solid var(--accent)44" onclick="document.getElementById('m-payamt').value=${v}">${fmt(v)}</button>`).join('')}
      </div>
      <button class="btn btn-full" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44" onclick="applyPayment(${data.id})">Apply Payment</button>`;
  } else if(type==='account'){
    title.textContent=data.id?'Edit Account':'Add Account';
    window._modalSave=()=>saveAccount(data.id||0);
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
      ${fld('m-aname','Account Name','text',data.name||'','e.g. Chase Checking')}
      ${sel('m-atype','Type',['checking','savings','investment','other'],data.type||'checking')}
      ${fld('m-abal','Balance','number',data.balance||0)}
      ${saveBtns(data.id,'delAccount')}
    </div>`;
  } else if(type==='expense'){
    title.textContent=data.id?'Edit Expense':'Add Expense';
    window._recurringState=!!data.recurring;
    window._modalSave=()=>saveExpense(data.id||0);
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
      ${fld('m-ename','Name','text',data.name||'','e.g. Wisdom Teeth')}
      ${fld('m-eamt','Amount','number',data.amount||'')}
      ${sel('m-ecat','Category',['housing','medical','auto','food','utilities','personal','business','other'],data.category||'other')}
      <div style="display:flex;align-items:center;gap:10px">
        <div id="toggle-recurring" onclick="toggleRecurring()" class="toggle" style="background:${data.recurring?'var(--accent)':'var(--border)'}">
          <div class="toggle-knob" style="left:${data.recurring?'18px':'2px'}"></div>
        </div>
        <span style="font-size:12px;color:var(--muted)">Recurring monthly</span>
      </div>
      ${saveBtns(data.id,'delExpense')}
    </div>`;
  } else if(type==='income_log'){
    title.textContent='Log Income';
    window._modalSave=()=>logIncome();
    const sources=['W2 Paycheck','Freelance','Side Income','Tax Refund','Other',...ST.incomeStreams.map(i=>i.name)].filter((v,i,a)=>a.indexOf(v)===i);
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
      ${sel('m-isrc','Source',sources,'W2 Paycheck')}
      ${fld('m-iamt','Amount','number','','0')}
      <button class="btn btn-full" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44" onclick="logIncome()">Log Income</button>
    </div>`;
  } else if(type==='income_stream'){
    const isNew=!data.id;
    title.textContent=isNew?'Add Income Source':'Edit Income Source';
    window._modalSave=()=>saveIncomeStream(data.id||0);
    const iconOpts=['⏱','🚀','💼','🎨','🔧','🛒','🎵','💻','📦','🏗'];
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
      ${fld('m-sname','Source Name','text',data.name||'','e.g. Side Gig')}
      <div><div style="font-size:11px;color:var(--muted);margin-bottom:6px">Icon</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px" id="icon-picker">
          ${iconOpts.map(ic=>`<button onclick="selectIcon('${ic}')" id="ico-${ic.codePointAt(0)}"
            style="font-size:20px;padding:8px;border-radius:8px;border:2px solid ${(data.icon||'⏱')===ic?'var(--accent)':'var(--border)'};background:${(data.icon||'⏱')===ic?'var(--accent)15':'var(--surface)'}">${ic}</button>`).join('')}
        </div>
      </div>
      ${fld('m-srate','Hourly Rate ($)','number',data.rate||'')}
      ${fld('m-shours','Hours/Week','number',data.hours||'')}
      ${saveBtns(data.id,'delIncomeStream')}
    </div>`;
    window._selectedIcon=data.icon||'⏱';
  } else if(type==='manual_win'){
    title.textContent='Log a Win';
    window._modalSave=()=>saveManualWin();
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px">
      <div><div style="font-size:11px;color:var(--muted);margin-bottom:5px">What did you accomplish?</div>
        <input type="text" id="m-wintext" placeholder="e.g. Paid extra $100 on CC" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;width:100%;outline:none">
      </div>
      ${fld('m-winamt','Amount (optional)','number','','0')}
      <button class="btn btn-full" style="background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)44" onclick="saveManualWin()">🏆 Log Win</button>
    </div>`;
  } else if(type==='confirm_reset'){
    title.textContent='Reset All Data?';
    body.innerHTML=`
      <div style="font-size:13px;color:var(--muted);margin-bottom:20px">This erases everything and resets to defaults. Cannot be undone.</div>
      <div style="display:flex;gap:10px">
        ${btnGhost('Cancel','var(--muted)',"closeModal()",'btn-full')}
        ${btn('Reset Everything','var(--danger)',"resetAll()",'btn-full')}
      </div>`;
  }
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function toggleRecurring(){
  window._recurringState=!window._recurringState;
  const t=document.getElementById('toggle-recurring');
  if(t){t.style.background=window._recurringState?'var(--accent)':'var(--border)';t.querySelector('.toggle-knob').style.left=window._recurringState?'18px':'2px';}
}
function selectIcon(ic){
  window._selectedIcon=ic;
  document.querySelectorAll('#icon-picker button').forEach(b=>{
    const active=b.textContent.trim()===ic;
    b.style.borderColor=active?'var(--accent)':'var(--border)';
    b.style.background=active?'var(--accent)15':'var(--surface)';
  });
}

// ── MODAL SAVES ───────────────────────────────────────────────────────────
function saveDebt(id){
  const name=document.getElementById('m-name').value;
  const balance=+document.getElementById('m-balance').value;
  const orig=+document.getElementById('m-orig').value||balance;
  const min=+document.getElementById('m-min').value;
  const apr=+document.getElementById('m-apr').value;
  if(!name||!balance)return;
  if(id){const d=ST.debts.find(x=>x.id===id);if(d)Object.assign(d,{name,balance,originalBalance:orig,minPayment:min,apr});}
  else ST.debts.push({id:uid(),name,balance,originalBalance:orig,minPayment:min,apr,color:COLORS[ST.debts.length%6]});
  save();closeModal();showToast('Debt saved');renderDebts();renderPlan();updateHeader();
}
function delDebt(id){
  ST.debts=ST.debts.filter(d=>d.id!==id);
  save();closeModal();showToast('Removed','#ff4d6a');renderDebts();renderPlan();updateHeader();
}
function applyPayment(id){
  const amt=+document.getElementById('m-payamt').value;
  if(!amt||amt<=0)return;
  const d=ST.debts.find(x=>x.id===id);
  if(d){
    d.balance=Math.max(0,d.balance-amt);
    addWin(`Paid ${fmt(amt)} on ${d.name}`,'payment',amt);
  }
  save();closeModal();showToast('💸 '+fmt(amt)+' applied!');renderDebts();renderPlan();updateHeader();
}
function saveAccount(id){
  const name=document.getElementById('m-aname').value;
  const type=document.getElementById('m-atype').value;
  const balance=+document.getElementById('m-abal').value;
  if(!name)return;
  if(id){const a=ST.accounts.find(x=>x.id===id);if(a)Object.assign(a,{name,type,balance});}
  else ST.accounts.push({id:uid(),name,type,balance,color:COLORS[(ST.accounts.length+2)%6]});
  save();closeModal();showToast('Account saved');renderAccounts();updateHeader();
}
function delAccount(id){
  ST.accounts=ST.accounts.filter(a=>a.id!==id);
  save();closeModal();showToast('Removed','#ff4d6a');renderAccounts();updateHeader();
}
function saveExpense(id){
  const name=document.getElementById('m-ename').value;
  const amount=+document.getElementById('m-eamt').value;
  const category=document.getElementById('m-ecat').value;
  const recurring=!!window._recurringState;
  if(!name||!amount)return;
  if(id){const e=ST.expenses.find(x=>x.id===id);if(e)Object.assign(e,{name,amount,category,recurring});}
  else ST.expenses.push({id:uid(),name,amount,category,recurring,completed:false});
  save();closeModal();showToast('Expense saved');renderDashboard();renderPlan();updateHeader();
}
function delExpense(id){
  ST.expenses=ST.expenses.filter(e=>e.id!==id);
  save();closeModal();renderDashboard();renderPlan();updateHeader();
}
function logIncome(){
  const source=document.getElementById('m-isrc').value;
  const amount=+document.getElementById('m-iamt').value;
  if(!amount||amount<=0)return;
  ST.incomeLog.unshift({id:uid(),source,amount,date:new Date().toLocaleDateString()});
  addWin(`Logged ${fmt(amount)} from ${source}`,'income',amount);
  save();closeModal();showToast('Income logged 💵');renderAccounts();
}
function saveIncomeStream(id){
  const name=document.getElementById('m-sname').value;
  const rate=+document.getElementById('m-srate').value;
  const hours=+document.getElementById('m-shours').value;
  const icon=window._selectedIcon||'💼';
  if(!name)return;
  if(id){const is=ST.incomeStreams.find(x=>x.id===id);if(is)Object.assign(is,{name,rate,hours,icon});}
  else ST.incomeStreams.push({id:uid(),name,icon,rate,hours,color:COLORS[ST.incomeStreams.length%6]});
  save();closeModal();showToast('Income source saved');renderIncome();updateHeader();
}
function delIncomeStream(id){
  if(ST.incomeStreams.length<=1){showToast('Need at least 1 income source','#ff4d6a');return;}
  ST.incomeStreams=ST.incomeStreams.filter(x=>x.id!==id);
  save();closeModal();showToast('Removed','#ff4d6a');renderIncome();updateHeader();
}
function saveManualWin(){
  const text=document.getElementById('m-wintext').value;
  const amount=+document.getElementById('m-winamt').value||0;
  if(!text)return;
  addWin(text,'manual',amount);
  closeModal();showToast('🏆 Win logged!');renderWins();
}
function resetAll(){
  ST=JSON.parse(JSON.stringify(DEFAULTS));save();
  closeModal();showToast('Reset','#ff4d6a');renderAll();
}

// ── HEADER & UTILS ────────────────────────────────────────────────────────
function updateHeader(){
  const c=computed();
  const el=document.getElementById('hdr-networth');
  if(el){el.textContent=fmt(c.netWorth);el.style.color=c.netWorth>=0?'var(--accent)':'var(--danger)';}
}

let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  document.getElementById('install-banner').style.display='flex';
});
function installApp(){
  if(!_deferredPrompt)return;
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted')document.getElementById('install-banner').style.display='none';});
}

// PWA manifest
(function(){
  function makeIcon(size){
    const c=document.createElement('canvas');c.width=c.height=size;
    const ctx=c.getContext('2d');const r=size*.22;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const g=ctx.createLinearGradient(0,0,size,size);
    g.addColorStop(0,'#0c2a1e');g.addColorStop(1,'#0a1628');
    ctx.fillStyle=g;ctx.fill();
    ctx.font=`${size*.58}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🏦',size/2,size/2+size*.04);
    return c.toDataURL('image/png');
  }
  try{
    const i180=makeIcon(180),i192=makeIcon(192),i512=makeIcon(512);
    const lnk=document.createElement('link');lnk.rel='apple-touch-icon';lnk.href=i180;document.head.appendChild(lnk);
    const m={name:'R3SET',short_name:'R3SET',start_url:'.',display:'standalone',background_color:'#080d16',theme_color:'#080d16',orientation:'portrait',
      icons:[{src:i192,sizes:'192x192',type:'image/png'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    const blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
    const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(blob);document.head.appendChild(ml);
  }catch(e){}
})();

function renderTab(id){
  if(id==='dashboard')renderDashboard();
  else if(id==='debts')renderDebts();
  else if(id==='accounts')renderAccounts();
  else if(id==='income')renderIncome();
  else if(id==='plan')renderPlan();
  else if(id==='wins')renderWins();
  updateHeader();
}
function renderAll(){renderDashboard();renderDebts();renderAccounts();renderIncome();renderPlan();renderWins();updateHeader();}

initTabBar();
switchTab('dashboard');
renderDebts();renderAccounts();renderIncome();renderPlan();renderWins();
</script>
